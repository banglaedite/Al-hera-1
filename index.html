<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Aggressively silence Vite WebSocket errors
      (function() {
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          if (typeof url === 'string' && (url.includes('vite') || url.includes('hmr'))) {
            console.warn('Blocking Vite WebSocket connection to:', url);
            return {
              addEventListener: () => {},
              removeEventListener: () => {},
              send: () => {},
              close: () => {},
              readyState: 3, // CLOSED
            };
          }
          try {
            return new OriginalWebSocket(url, protocols);
          } catch (e) {
            console.warn('WebSocket connection failed:', e);
            return {
              addEventListener: () => {},
              removeEventListener: () => {},
              send: () => {},
              close: () => {},
              readyState: 3,
            };
          }
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;
      })();

      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          (event.reason.message && event.reason.message.includes('WebSocket')) ||
          (typeof event.reason === 'string' && event.reason.includes('WebSocket'))
        )) {
          event.preventDefault();
        }
      });

      const originalError = console.error;
      console.error = (...args) => {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('[vite] failed to connect to websocket') ||
          args[0].includes('WebSocket closed without opened')
        )) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
