<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Aggressively silence Vite WebSocket errors
      (function() {
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          if (typeof url === 'string' && (url.includes('vite') || url.includes('hmr'))) {
            // Return a dummy object that mimics a closed WebSocket
            return {
              addEventListener: () => {},
              removeEventListener: () => {},
              send: () => {},
              close: () => {},
              readyState: 3, // CLOSED
              onopen: null,
              onclose: null,
              onerror: null,
              onmessage: null,
            };
          }
          try {
            return new OriginalWebSocket(url, protocols);
          } catch (e) {
            return {
              addEventListener: () => {},
              removeEventListener: () => {},
              send: () => {},
              close: () => {},
              readyState: 3,
            };
          }
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;
      })();

      // Silence unhandled rejections related to WebSockets
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (reason && (
          (reason.message && reason.message.includes('WebSocket')) ||
          (typeof reason === 'string' && reason.includes('WebSocket')) ||
          (reason.name === 'Error' && reason.message === 'WebSocket closed without opened')
        )) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      // Silence console errors and warnings related to Vite/WebSocket
      const silencePatterns = [
        '[vite] failed to connect to websocket',
        'WebSocket closed without opened',
        'WebSocket connection failed',
        'hmr'
      ];

      const originalError = console.error;
      console.error = (...args) => {
        if (args[0] && typeof args[0] === 'string' && silencePatterns.some(p => args[0].toLowerCase().includes(p.toLowerCase()))) {
          return;
        }
        originalError.apply(console, args);
      };

      const originalWarn = console.warn;
      console.warn = (...args) => {
        if (args[0] && typeof args[0] === 'string' && silencePatterns.some(p => args[0].toLowerCase().includes(p.toLowerCase()))) {
          return;
        }
        originalWarn.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
