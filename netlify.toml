[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NETLIFY = "true"

[functions]
  included_files = ["firebase-applet-config.json", "service-account.json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
